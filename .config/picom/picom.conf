# Lightweight picom config — removes screen tearing and adds soft shadows/fades.
# Uses the "xrender" backend — compatible even with old GPUs (e.g. Radeon HD6670).
# If you have a modern GPU and want better quality, switch backend to "glx".

backend = "xrender";
vsync = true;

# Window shadows
shadow = true;
shadow-radius = 10;
shadow-opacity = 0.5;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'"
];

# Smooth fade in/out for windows
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 6;

# Rounded corners (subtle modern look)
corner-radius = 6;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'"
];

# Opacity (kept at full — tune here if you want inactive windows dimmed)
inactive-opacity = 1.0;
frame-opacity = 1.0;

# Performance — matters on low-end hardware
unredir-if-possible = true;
